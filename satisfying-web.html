<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ Infinite Spark</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  cursor:none;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
canvas { position:fixed; top:0; left:0; display:block; }

/* ── CURSOR: glowing crosshair ── */
#cursor {
  position:fixed;
  width:28px; height:28px;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
}
#cursor::before, #cursor::after {
  content:'';
  position:absolute;
  background:rgba(255,255,255,0.85);
  border-radius:2px;
}
/* horizontal line */
#cursor::before {
  width:100%; height:1.5px;
  top:50%; left:0; transform:translateY(-50%);
  box-shadow:0 0 6px 2px rgba(180,160,255,0.8);
}
/* vertical line */
#cursor::after {
  height:100%; width:1.5px;
  left:50%; top:0; transform:translateX(-50%);
  box-shadow:0 0 6px 2px rgba(180,160,255,0.8);
}

/* center dot */
#cursorDot {
  position:fixed;
  width:4px; height:4px; border-radius:50%;
  background:#fff;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:10000;
  box-shadow:0 0 8px 3px rgba(200,180,255,1);
}

/* ── PANEL ── */
#panelWrap {
  position:fixed; bottom:18px; left:0; right:0;
  display:flex; justify-content:center;
  overflow-x:auto; z-index:1000; padding:0 16px;
  scrollbar-width:none; -ms-overflow-style:none;
}
#panelWrap::-webkit-scrollbar { display:none; }
#panel {
  display:flex; gap:4px; align-items:center;
  background:rgba(6,6,14,0.92);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:50px; padding:7px 12px; flex-shrink:0;
  box-shadow:0 4px 30px rgba(0,0,0,0.8);
}
.mode-btn {
  background:none; border:none; color:rgba(255,255,255,0.35);
  font-size:11.5px; padding:6px 11px; border-radius:40px;
  cursor:pointer; transition:all 0.2s; font-weight:600;
  letter-spacing:0.3px; white-space:nowrap;
}
.mode-btn:hover { color:#fff; }
.mode-btn.active { background:rgba(255,255,255,0.12); color:#fff; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.15); }
.sep { width:1px; height:20px; background:rgba(255,255,255,0.1); margin:0 2px; flex-shrink:0; }

/* ── TOPBAR ── */
#topbar {
  position:fixed; top:14px; left:50%; transform:translateX(-50%);
  display:flex; gap:8px; align-items:center; z-index:1000;
}
#hint { color:rgba(255,255,255,0.18); font-size:11px; letter-spacing:2px;
  pointer-events:none; text-transform:uppercase; transition:opacity 1.5s; }
#clearBtn {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.3); font-size:11px; padding:5px 12px;
  border-radius:40px; cursor:pointer; transition:all 0.2s;
}
#clearBtn:hover { color:#fff; background:rgba(255,255,255,0.09); }

/* ── PALETTE ── */
#palette {
  position:fixed; right:14px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; gap:8px; z-index:1000;
}
.cdot {
  width:20px; height:20px; border-radius:50%;
  cursor:pointer; border:2px solid transparent; transition:all 0.2s;
}
.cdot:hover,.cdot.active { transform:scale(1.4); border-color:#fff; }
</style>
</head>
<body>

<canvas id="worldCanvas"></canvas>
<canvas id="fxCanvas"></canvas>
<div id="cursor"></div>
<div id="cursorDot"></div>

<div id="topbar">
  <span id="hint">✦ Touch to spark</span>
  <button id="clearBtn">✕ Clear</button>
</div>

<div id="panelWrap">
  <div id="panel">
    <button class="mode-btn active" data-mode="fireworks">🎆 Fireworks</button>
    <button class="mode-btn" data-mode="multifire">🌈 Multi Fire</button>
    <div class="sep"></div>
    <button class="mode-btn" data-mode="draw">✏️ Draw</button>
    <button class="mode-btn" data-mode="sparkline">✦ Spark Line</button>
    <div class="sep"></div>
    <button class="mode-btn" data-mode="glitter">✨ Glitter</button>
  </div>
</div>

<div id="palette">
  <div class="cdot active" data-hue="-1" style="background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);box-shadow:0 0 7px rgba(255,255,255,0.4)"></div>
  <div class="cdot" data-hue="0"   style="background:#ff2244;box-shadow:0 0 7px #ff2244"></div>
  <div class="cdot" data-hue="30"  style="background:#ff8800;box-shadow:0 0 7px #ff8800"></div>
  <div class="cdot" data-hue="55"  style="background:#ffe600;box-shadow:0 0 7px #ffe600"></div>
  <div class="cdot" data-hue="130" style="background:#00ff88;box-shadow:0 0 7px #00ff88"></div>
  <div class="cdot" data-hue="200" style="background:#00cfff;box-shadow:0 0 7px #00cfff"></div>
  <div class="cdot" data-hue="270" style="background:#cc44ff;box-shadow:0 0 7px #cc44ff"></div>
  <div class="cdot" data-hue="320" style="background:#ff44aa;box-shadow:0 0 7px #ff44aa"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════
const worldC = document.getElementById('worldCanvas');
const fxC    = document.getElementById('fxCanvas');
const wCtx   = worldC.getContext('2d');
const fCtx   = fxC.getContext('2d');
const DPR    = Math.min(window.devicePixelRatio||1, 2);
let VW = window.innerWidth, VH = window.innerHeight;

function resize() {
  VW = window.innerWidth; VH = window.innerHeight;
  [worldC, fxC].forEach(c => {
    c.width  = VW*DPR; c.height = VH*DPR;
    c.style.width = VW+'px'; c.style.height = VH+'px';
  });
  wCtx.setTransform(1,0,0,1,0,0); wCtx.scale(DPR,DPR);
  fCtx.setTransform(1,0,0,1,0,0); fCtx.scale(DPR,DPR);
  redrawWorld();
}
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════
//  INFINITE WORLD
// ═══════════════════════════════════════════════════════
const WORLD_W = 6000, WORLD_H = 6000;
const offC = document.createElement('canvas');
offC.width = WORLD_W; offC.height = WORLD_H;
const oCtx = offC.getContext('2d');
oCtx.fillStyle='#000'; oCtx.fillRect(0,0,WORLD_W,WORLD_H);

let panX = WORLD_W/2 - window.innerWidth/2;
let panY = WORLD_H/2 - window.innerHeight/2;
function clampPan(){ panX=Math.max(0,Math.min(WORLD_W-VW,panX)); panY=Math.max(0,Math.min(WORLD_H-VH,panY)); }
function toWorld(sx,sy){ return {x:sx+panX, y:sy+panY}; }
function toScreen(wx,wy){ return {x:wx-panX, y:wy-panY}; }
function redrawWorld(){ wCtx.clearRect(0,0,VW,VH); wCtx.drawImage(offC,-panX,-panY,WORLD_W,WORLD_H); }
resize();

// ═══════════════════════════════════════════════════════
//  CINEMATIC AUDIO ENGINE
// ═══════════════════════════════════════════════════════
let AC = null;
function getAC(){
  if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}

// Reverb impulse — makes everything sound spacious
function makeReverb(ac, dur=1.8, decay=2.2){
  const len = ac.sampleRate * dur;
  const buf = ac.createBuffer(2, len, ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);
  }
  const conv=ac.createConvolver(); conv.buffer=buf; return conv;
}
let _reverb=null;
function getReverb(){
  const ac=getAC();
  if(!_reverb){ _reverb=makeReverb(ac); _reverb.connect(ac.destination); }
  return _reverb;
}

// ── FIREWORK SOUND: cinematic boom + shimmer tail ──
function snd_firework(pan=0){
  try{
    const ac=getAC(), now=ac.currentTime;
    const rev=getReverb();

    // 1. Deep BOOM — layered sine sweeps
    [80,55,40].forEach((freq,i)=>{
      const o=ac.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(freq*(1+i*0.3), now);
      o.frequency.exponentialRampToValueAtTime(20, now+0.5);
      const g=ac.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.28-i*0.06, now+0.01);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.55);
      const p=ac.createStereoPanner(); p.pan.value=pan*0.4;
      o.connect(g); g.connect(p); p.connect(rev); p.connect(ac.destination);
      o.start(now); o.stop(now+0.6);
    });

    // 2. Crackle burst — filtered noise
    const blen=Math.floor(ac.sampleRate*0.08);
    const nbuf=ac.createBuffer(1,blen,ac.sampleRate);
    const nd=nbuf.getChannelData(0);
    for(let i=0;i<blen;i++) nd[i]=(Math.random()*2-1);
    const ns=ac.createBufferSource(); ns.buffer=nbuf;
    const nf=ac.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=1200; nf.Q.value=0.8;
    const ng=ac.createGain();
    ng.gain.setValueAtTime(0.6,now); ng.gain.exponentialRampToValueAtTime(0.001,now+0.08);
    ns.connect(nf); nf.connect(ng); ng.connect(rev); ng.connect(ac.destination);
    ns.start(now);

    // 3. Shimmer tail — high sparkle noise fading
    const slen=Math.floor(ac.sampleRate*1.2);
    const sbuf=ac.createBuffer(1,slen,ac.sampleRate);
    const sd=sbuf.getChannelData(0);
    for(let i=0;i<slen;i++){
      const t=i/ac.sampleRate;
      sd[i]=(Math.random()<0.04?(Math.random()*2-1)*0.9:0)*Math.exp(-t*4.5);
    }
    const ss=ac.createBufferSource(); ss.buffer=sbuf;
    const shf=ac.createBiquadFilter(); shf.type='highpass'; shf.frequency.value=3500;
    const shg=ac.createGain();
    shg.gain.setValueAtTime(0.45,now+0.06); shg.gain.exponentialRampToValueAtTime(0.001,now+1.3);
    ss.connect(shf); shf.connect(shg); shg.connect(rev); shg.connect(ac.destination);
    ss.start(now+0.06);

    // 4. Whistle launch (ascending tone before boom)
    const wo=ac.createOscillator(); wo.type='sine';
    wo.frequency.setValueAtTime(300,now-0.12); wo.frequency.exponentialRampToValueAtTime(900,now);
    const wg=ac.createGain();
    wg.gain.setValueAtTime(0.08,now-0.12); wg.gain.exponentialRampToValueAtTime(0.001,now);
    wo.connect(wg); wg.connect(ac.destination);
    wo.start(now-0.12); wo.stop(now+0.01);

  }catch(e){}
}

// ── SPARKLE SOUND: crystalline chime ──
let _lastSpkSnd=0;
function snd_sparkle(){
  const now=Date.now(); if(now-_lastSpkSnd<60) return; _lastSpkSnd=now;
  try{
    const ac=getAC(), t=ac.currentTime;
    const rev=getReverb();
    // Bell-like tone
    const freqs=[2093,2637,3136,4186]; // musical notes C7,E7,G7,C8
    const f=freqs[Math.floor(Math.random()*freqs.length)];
    const o=ac.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(f,t);
    o.frequency.exponentialRampToValueAtTime(f*0.98,t+0.3);
    const g=ac.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.12,t+0.004);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    // harmonics
    const o2=ac.createOscillator(); o2.type='sine';
    o2.frequency.setValueAtTime(f*2,t);
    const g2=ac.createGain();
    g2.gain.setValueAtTime(0.03,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.connect(g); g.connect(rev); g.connect(ac.destination);
    o2.connect(g2); g2.connect(ac.destination);
    o.start(t); o.stop(t+0.4);
    o2.start(t); o2.stop(t+0.2);
  }catch(e){}
}

// ── DRAW SOUND: soft magical hum ──
let _lastDrwSnd=0;
function snd_draw(){
  const now=Date.now(); if(now-_lastDrwSnd<120) return; _lastDrwSnd=now;
  try{
    const ac=getAC(), t=ac.currentTime;
    const o=ac.createOscillator(); o.type='sine';
    const baseFreq=300+autoHue*2;
    o.frequency.setValueAtTime(baseFreq,t);
    o.frequency.linearRampToValueAtTime(baseFreq*1.04,t+0.1);
    const g=ac.createGain();
    g.gain.setValueAtTime(0.04,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o.connect(g); g.connect(getAC().destination);
    o.start(t); o.stop(t+0.13);
  }catch(e){}
}

// ── GLITTER SOUND: tiny tinkle ──
let _lastGltSnd=0;
function snd_glitter(){
  const now=Date.now(); if(now-_lastGltSnd<45) return; _lastGltSnd=now;
  try{
    const ac=getAC(), t=ac.currentTime;
    const o=ac.createOscillator(); o.type='triangle';
    o.frequency.setValueAtTime(2800+Math.random()*900,t);
    o.frequency.exponentialRampToValueAtTime(1200,t+0.07);
    const g=ac.createGain();
    g.gain.setValueAtTime(0.055,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.07);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t+0.08);
  }catch(e){}
}

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let mode='fireworks', fixedHue=-1, autoHue=0;
let particles=[], currentPath=[];
let isDrawing=false, isPanning=false;
let panSX=0, panSY=0, panPX=0, panPY=0;
let spaceHeld=false, hintHidden=false;
let mouse={sx:VW/2, sy:VH/2};
const MAX_P=800;

function getHue(off=0){ return fixedHue>=0?(fixedHue+off)%360:(autoHue+off)%360; }

// ═══════════════════════════════════════════════════════
//  CURSOR
// ═══════════════════════════════════════════════════════
const curEl=document.getElementById('cursor');
const dotEl=document.getElementById('cursorDot');
function moveCursor(sx,sy){
  curEl.style.left=sx+'px'; curEl.style.top=sy+'px';
  dotEl.style.left=sx+'px'; dotEl.style.top=sy+'px';
  mouse.sx=sx; mouse.sy=sy;
}

// ═══════════════════════════════════════════════════════
//  PAN
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{if(e.code==='Space'){spaceHeld=true;e.preventDefault();}});
document.addEventListener('keyup',  e=>{if(e.code==='Space') spaceHeld=false;});
function startPan(sx,sy){isPanning=true;panSX=sx;panSY=sy;panPX=panX;panPY=panY;}
function doPan(sx,sy){panX=panPX-(sx-panSX);panY=panPY-(sy-panSY);clampPan();redrawWorld();}

fxC.addEventListener('wheel',e=>{panX+=e.deltaX;panY+=e.deltaY;clampPan();redrawWorld();e.preventDefault();},{passive:false});

let tf=false,tfp={x:0,y:0};
fxC.addEventListener('touchstart',e=>{
  if(e.touches.length===2){tf=true;tfp={x:e.touches[0].clientX,y:e.touches[0].clientY};}
},{passive:false});
fxC.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(tf&&e.touches.length===2){
    const t=e.touches[0];
    panX-=t.clientX-tfp.x; panY-=t.clientY-tfp.y;
    clampPan(); redrawWorld(); tfp={x:t.clientX,y:t.clientY};
  } else if(!tf&&e.touches.length===1){
    const t=e.touches[0]; moveCursor(t.clientX,t.clientY); onMove(t.clientX,t.clientY);
  }
},{passive:false});
fxC.addEventListener('touchend',e=>{if(e.touches.length<2)tf=false;});

// ═══════════════════════════════════════════════════════
//  POINTER EVENTS
// ═══════════════════════════════════════════════════════
function hideHint(){if(!hintHidden){document.getElementById('hint').style.opacity='0';hintHidden=true;}}

function onDown(sx,sy){
  hideHint();
  if(spaceHeld){startPan(sx,sy);return;}
  isDrawing=true;
  currentPath=[{wx:sx+panX,wy:sy+panY,hue:getHue()}];
  if(mode==='fireworks'){launchFirework(sx,sy,1,false);snd_firework((sx/VW-0.5)*2);}
  if(mode==='multifire'){launchMultiFire(sx,sy);snd_firework((sx/VW-0.5)*2);}
  if(mode==='glitter'){spawnGlitter(sx,sy,22);snd_glitter();}
}
function onMove(sx,sy){
  if(isPanning){doPan(sx,sy);return;}
  if(!isDrawing)return;
  const w=toWorld(sx,sy);
  currentPath.push({wx:w.x,wy:w.y,hue:getHue()});
  if(mode==='glitter'){spawnGlitter(sx,sy,3);snd_glitter();}
  if(mode==='draw'){snd_draw();}
}
function onUp(sx,sy){
  if(isPanning){isPanning=false;return;}
  if(!isDrawing)return;
  isDrawing=false;
  if(mode==='draw'&&currentPath.length>1) commitDraw(currentPath);
  if(mode==='sparkline'&&currentPath.length>1){commitSparkLine([...currentPath]);snd_sparkle();}
  currentPath=[];
}

fxC.addEventListener('mousedown',e=>onDown(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>{moveCursor(e.clientX,e.clientY);onMove(e.clientX,e.clientY);});
window.addEventListener('mouseup',e=>onUp(e.clientX,e.clientY));
fxC.addEventListener('touchstart',e=>{
  if(e.touches.length===1){e.preventDefault();const t=e.touches[0];moveCursor(t.clientX,t.clientY);onDown(t.clientX,t.clientY);}
},{passive:false});
fxC.addEventListener('touchend',e=>{
  const t=e.changedTouches[0];onUp(t.clientX,t.clientY);
},{passive:false});

// ═══════════════════════════════════════════════════════
//  FIREWORKS
// ═══════════════════════════════════════════════════════
function launchFirework(sx,sy,scale,multi){
  if(particles.length>MAX_P)return;
  const cnt=Math.floor((42+Math.random()*30)*scale);
  const bh=multi?Math.random()*360:getHue();
  for(let i=0;i<cnt;i++){
    const a=(Math.PI*2/cnt)*i+Math.random()*0.28;
    const sp=(1.8+Math.random()*5.5)*scale;
    particles.push({
      type:'spark',sx,sy,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:1,decay:0.009+Math.random()*0.013,
      size:(1.4+Math.random()*2)*scale,
      hue:multi?(bh+Math.random()*55-27):(bh+Math.random()*40-20),
      bright:78+Math.random()*22,trail:[]
    });
  }
  for(let i=0;i<20*scale;i++){
    const a=Math.random()*Math.PI*2,sp=Math.random()*3.5*scale;
    particles.push({
      type:'spl',
      sx:sx+(Math.random()-0.5)*14,sy:sy+(Math.random()-0.5)*14,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.8,
      life:1,decay:0.02+Math.random()*0.02,
      size:0.9+Math.random()*2.2,
      hue:multi?Math.random()*360:getHue(Math.random()*70-35),
      rot:Math.random()*Math.PI*2,rotS:(Math.random()-0.5)*0.4
    });
  }
  particles.push({type:'flash',sx,sy,life:1,decay:0.1,size:18*scale,hue:multi?Math.random()*360:getHue()});
}

function launchMultiFire(sx,sy){
  const b=3+Math.floor(Math.random()*3);
  for(let i=0;i<b;i++){
    const ox=(Math.random()-0.5)*55,oy=(Math.random()-0.5)*55;
    launchFirework(sx+ox,sy+oy,0.75,true);
  }
}

// ═══════════════════════════════════════════════════════
//  GLITTER
// ═══════════════════════════════════════════════════════
function spawnGlitter(sx,sy,cnt){
  for(let i=0;i<cnt;i++){
    particles.push({
      type:'glit',
      sx:sx+(Math.random()-0.5)*14,sy:sy+(Math.random()-0.5)*14,
      vx:(Math.random()-0.5)*2.5,vy:-Math.random()*3.5-0.5,
      life:1,decay:0.02+Math.random()*0.025,
      size:1.4+Math.random()*3.5,
      hue:getHue(Math.random()*90-45),
      rot:Math.random()*Math.PI*2,rotS:(Math.random()-0.5)*0.4,
      shape:Math.random()>0.5?'star':'dia'
    });
  }
}

// ═══════════════════════════════════════════════════════
//  DRAW → WORLD CANVAS (crisp, no blur)
// ═══════════════════════════════════════════════════════
function commitDraw(path){
  if(path.length<2)return;
  // Smooth path first using Catmull-Rom spline points
  const smooth=smoothPath(path,6);
  oCtx.save();
  oCtx.lineCap='round';
  oCtx.lineJoin='round';
  oCtx.imageSmoothingEnabled=true;
  // Core line — single crisp pass
  oCtx.beginPath();
  oCtx.moveTo(smooth[0].wx,smooth[0].wy);
  for(let i=1;i<smooth.length;i++) oCtx.lineTo(smooth[i].wx,smooth[i].wy);
  oCtx.strokeStyle=`hsl(${smooth[0].hue},100%,70%)`;
  oCtx.lineWidth=2.5;
  oCtx.stroke();
  // Single soft glow pass (low alpha, thick)
  oCtx.globalAlpha=0.25;
  oCtx.beginPath();
  oCtx.moveTo(smooth[0].wx,smooth[0].wy);
  for(let i=1;i<smooth.length;i++) oCtx.lineTo(smooth[i].wx,smooth[i].wy);
  oCtx.strokeStyle=`hsl(${smooth[0].hue},100%,85%)`;
  oCtx.lineWidth=7;
  oCtx.stroke();
  oCtx.globalAlpha=1;
  oCtx.restore();
  redrawWorld();
}

// ── Catmull-Rom smoothing — removes dots between segments ──
function smoothPath(path, tension=6){
  if(path.length<3) return path;
  // Downsample first to avoid too many points
  const ds=[];
  const minDist=4;
  ds.push(path[0]);
  for(let i=1;i<path.length;i++){
    const prev=ds[ds.length-1];
    const dx=path[i].wx-prev.wx, dy=path[i].wy-prev.wy;
    if(Math.sqrt(dx*dx+dy*dy)>=minDist) ds.push(path[i]);
  }
  if(ds.length<2) return path;
  const out=[];
  for(let i=0;i<ds.length-1;i++){
    const p0=ds[Math.max(i-1,0)];
    const p1=ds[i];
    const p2=ds[i+1];
    const p3=ds[Math.min(i+2,ds.length-1)];
    for(let t=0;t<tension;t++){
      const tt=t/tension;
      const t2=tt*tt, t3=t2*tt;
      const wx=0.5*(2*p1.wx+(-p0.wx+p2.wx)*tt+(2*p0.wx-5*p1.wx+4*p2.wx-p3.wx)*t2+(-p0.wx+3*p1.wx-3*p2.wx+p3.wx)*t3);
      const wy=0.5*(2*p1.wy+(-p0.wy+p2.wy)*tt+(2*p0.wy-5*p1.wy+4*p2.wy-p3.wy)*t2+(-p0.wy+3*p1.wy-3*p2.wy+p3.wy)*t3);
      out.push({wx,wy,hue:p1.hue});
    }
  }
  out.push(ds[ds.length-1]);
  return out;
}

// ═══════════════════════════════════════════════════════
//  SPARK LINE → world + animated sparkles fade along path
// ═══════════════════════════════════════════════════════
function commitSparkLine(path){
  if(path.length<2)return;
  const smooth=smoothPath(path,6);
  oCtx.save();
  oCtx.lineCap='round'; oCtx.lineJoin='round';
  // Glow layer
  oCtx.globalAlpha=0.4;
  oCtx.beginPath(); oCtx.moveTo(smooth[0].wx,smooth[0].wy);
  for(let i=1;i<smooth.length;i++) oCtx.lineTo(smooth[i].wx,smooth[i].wy);
  oCtx.strokeStyle=`hsl(${smooth[0].hue},100%,75%)`;
  oCtx.lineWidth=10; oCtx.stroke();
  // Core
  oCtx.globalAlpha=1;
  oCtx.beginPath(); oCtx.moveTo(smooth[0].wx,smooth[0].wy);
  for(let i=1;i<smooth.length;i++) oCtx.lineTo(smooth[i].wx,smooth[i].wy);
  oCtx.strokeStyle=`hsl(${smooth[0].hue},100%,94%)`;
  oCtx.lineWidth=2; oCtx.stroke();
  oCtx.restore();
  redrawWorld();

  // Animated sparkle fade along smooth path
  const step=Math.max(1,Math.floor(smooth.length/55));
  smooth.filter((_,i)=>i%step===0).forEach((pt,idx)=>{
    setTimeout(()=>{
      const sc=toScreen(pt.wx,pt.wy);
      for(let k=0;k<5;k++){
        particles.push({
          type:'spl',
          sx:sc.x+(Math.random()-0.5)*9, sy:sc.y+(Math.random()-0.5)*9,
          vx:(Math.random()-0.5)*1.8, vy:-Math.random()*2-0.3,
          life:1, decay:0.016+Math.random()*0.016,
          size:1+Math.random()*2.5,
          hue:pt.hue+Math.random()*35-17,
          rot:Math.random()*Math.PI*2, rotS:(Math.random()-0.5)*0.45
        });
      }
      snd_sparkle();
    }, idx*13);
  });
}

// ═══════════════════════════════════════════════════════
//  LIVE PREVIEW WHILE DRAWING
// ═══════════════════════════════════════════════════════
function renderLivePath(){
  if(currentPath.length<2)return;
  const smooth=smoothPath(currentPath,4);
  fCtx.save(); fCtx.lineCap='round'; fCtx.lineJoin='round';
  if(mode==='sparkline'){
    fCtx.globalAlpha=0.4;
    fCtx.beginPath(); fCtx.moveTo(smooth[0].wx-panX,smooth[0].wy-panY);
    for(let i=1;i<smooth.length;i++) fCtx.lineTo(smooth[i].wx-panX,smooth[i].wy-panY);
    fCtx.strokeStyle=`hsl(${smooth[0].hue},100%,75%)`; fCtx.lineWidth=10; fCtx.stroke();
    fCtx.globalAlpha=1;
    fCtx.beginPath(); fCtx.moveTo(smooth[0].wx-panX,smooth[0].wy-panY);
    for(let i=1;i<smooth.length;i++) fCtx.lineTo(smooth[i].wx-panX,smooth[i].wy-panY);
    fCtx.strokeStyle=`hsl(${smooth[0].hue},100%,94%)`; fCtx.lineWidth=2; fCtx.stroke();
  } else {
    fCtx.beginPath(); fCtx.moveTo(smooth[0].wx-panX,smooth[0].wy-panY);
    for(let i=1;i<smooth.length;i++) fCtx.lineTo(smooth[i].wx-panX,smooth[i].wy-panY);
    fCtx.strokeStyle=`hsl(${smooth[0].hue},100%,70%)`; fCtx.lineWidth=2.5; fCtx.stroke();
    fCtx.globalAlpha=0.22;
    fCtx.beginPath(); fCtx.moveTo(smooth[0].wx-panX,smooth[0].wy-panY);
    for(let i=1;i<smooth.length;i++) fCtx.lineTo(smooth[i].wx-panX,smooth[i].wy-panY);
    fCtx.strokeStyle=`hsl(${smooth[0].hue},100%,88%)`; fCtx.lineWidth=7; fCtx.stroke();
    fCtx.globalAlpha=1;
  }
  fCtx.restore();
}

// ═══════════════════════════════════════════════════════
//  SHAPE HELPERS
// ═══════════════════════════════════════════════════════
function star(c,cx,cy,r){
  c.beginPath();
  for(let i=0;i<8;i++){
    const a=(i*Math.PI/4)-Math.PI/2, rad=i%2===0?r:r*0.38;
    c.lineTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad);
  }
  c.closePath(); c.fill();
}
function dia(c,cx,cy,r){
  c.beginPath();
  c.moveTo(cx,cy-r); c.lineTo(cx+r*0.55,cy);
  c.lineTo(cx,cy+r); c.lineTo(cx-r*0.55,cy);
  c.closePath(); c.fill();
}

// ═══════════════════════════════════════════════════════
//  MAIN RENDER LOOP
// ═══════════════════════════════════════════════════════
let lastT=0;
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min((ts-lastT)/16.67,3); lastT=ts;
  autoHue=(autoHue+0.55*dt)%360;
  if(particles.length>MAX_P) particles.splice(0,particles.length-MAX_P);
  fCtx.clearRect(0,0,VW,VH);
  if(isDrawing&&(mode==='draw'||mode==='sparkline')) renderLivePath();

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=p.decay*dt;
    if(p.life<=0){particles.splice(i,1);continue;}

    if(p.type==='flash'){
      const r=p.size*(1+(1-p.life)*0.5);
      const g=fCtx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,r);
      g.addColorStop(0,`hsla(${p.hue},100%,100%,${p.life*0.8})`);
      g.addColorStop(0.4,`hsla(${p.hue},100%,80%,${p.life*0.3})`);
      g.addColorStop(1,'transparent');
      fCtx.beginPath(); fCtx.arc(p.sx,p.sy,r,0,Math.PI*2);
      fCtx.fillStyle=g; fCtx.fill();
      continue;
    }

    if(p.type==='spark'){
      p.vy+=0.06*dt; p.vx*=Math.pow(0.984,dt); p.vy*=Math.pow(0.984,dt);
      p.sx+=p.vx*dt; p.sy+=p.vy*dt;
      p.trail.push({x:p.sx,y:p.sy});
      if(p.trail.length>7) p.trail.shift();
      for(let t=1;t<p.trail.length;t++){
        const ta=(t/p.trail.length)*p.life*0.75;
        fCtx.beginPath();
        fCtx.moveTo(p.trail[t-1].x,p.trail[t-1].y);
        fCtx.lineTo(p.trail[t].x,p.trail[t].y);
        fCtx.strokeStyle=`hsla(${p.hue},100%,${p.bright}%,${ta})`;
        fCtx.lineWidth=p.size*(t/p.trail.length)*0.85;
        fCtx.lineCap='round'; fCtx.stroke();
      }
      fCtx.beginPath(); fCtx.arc(p.sx,p.sy,p.size*p.life,0,Math.PI*2);
      fCtx.fillStyle=`hsla(${p.hue},100%,97%,${p.life})`;
      fCtx.fill();
      continue;
    }

    if(p.type==='spl'){
      p.sx+=p.vx*dt; p.sy+=p.vy*dt; p.vy+=0.04*dt; p.rot+=p.rotS*dt;
      const s=p.size*p.life;
      fCtx.save(); fCtx.translate(p.sx,p.sy); fCtx.rotate(p.rot);
      fCtx.fillStyle=`hsla(${p.hue},100%,93%,${p.life})`;
      fCtx.fillRect(-s*0.17,-s,s*0.34,s*2);
      fCtx.fillRect(-s,-s*0.17,s*2,s*0.34);
      fCtx.fillStyle=`rgba(255,255,255,${p.life*0.82})`;
      fCtx.beginPath(); fCtx.arc(0,0,s*0.24,0,Math.PI*2); fCtx.fill();
      fCtx.restore(); continue;
    }

    if(p.type==='glit'){
      p.sx+=p.vx*dt; p.sy+=p.vy*dt; p.vy+=0.055*dt; p.rot+=p.rotS*dt;
      const s=p.size*p.life;
      fCtx.save(); fCtx.translate(p.sx,p.sy); fCtx.rotate(p.rot);
      fCtx.fillStyle=`hsla(${p.hue},100%,86%,${p.life})`;
      if(p.shape==='star') star(fCtx,0,0,s);
      else dia(fCtx,0,0,s);
      fCtx.fillStyle=`rgba(255,255,255,${p.life*0.78})`;
      fCtx.beginPath(); fCtx.arc(0,0,s*0.26,0,Math.PI*2); fCtx.fill();
      fCtx.restore(); continue;
    }
  }
}
requestAnimationFrame(frame);

// ═══════════════════════════════════════════════════════
//  UI CONTROLS
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.cdot').forEach(d=>{
  d.addEventListener('click',()=>{
    document.querySelectorAll('.cdot').forEach(x=>x.classList.remove('active'));
    d.classList.add('active'); fixedHue=parseInt(d.dataset.hue);
  });
});
document.querySelectorAll('.mode-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); mode=b.dataset.mode;
    isDrawing=false; currentPath=[];
  });
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  particles=[]; currentPath=[];
  oCtx.fillStyle='#000'; oCtx.fillRect(0,0,WORLD_W,WORLD_H);
  redrawWorld();
});
</script>
